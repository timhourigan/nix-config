---
# Workflow to build Home Manager configuration from the flake
name: build-home-manager
run-name: Build Home Manager
on:
  pull_request:
jobs:
  build-hm:
    strategy:
      matrix:
        user: [timh]
        host: [aarch64darwin-t, aarch64linux-t, amd64linux-t, bri7, m625q, mm, opx7070, sid, t490, x13]
        include:
          - host: aarch64darwin-t
            runner: macos-latest
          - host: aarch64linux-t
            runner: ubuntu-24.04-arm
          - host: amd64linux-t
            runner: ubuntu-latest
          - host: bri7
            runner: ubuntu-latest
          - host: m625q
            runner: ubuntu-latest
          - host: mm
            runner: ubuntu-latest
          - host: opx7070
            runner: ubuntu-latest
          - host: sid
            runner: ubuntu-latest
          - host: t490
            runner: ubuntu-latest
          - host: x13
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Free up disk space
        # https://github.com/jlumbroso/free-disk-space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          # Just Android is sufficient for now
          # Adding more, increases the job time
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      # https://nix.dev/tutorials/nixos/continuous-integration-github-actions
      - name: Cachix cache
        uses: cachix/cachix-action@v17
        with:
          name: timhourigan
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build
        run: |
          nix-shell -p home-manager gnumake --run "make build-hm"
        env:
          # Used by the makefile
          USER: ${{ matrix.user }}
          HOSTNAME: ${{ matrix.host }}
          NIX_OUTPUT_MONITOR: ""
        timeout-minutes: 15
